<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 3 - Conditional Location</title>
</head>
<body>
  <h1>Exercise 3</h1>
  <p id="status"></p>

 <script>
  const statusText = document.getElementById("status");
  const ua = navigator.userAgent;

  if (ua.includes("Mozilla")) {
    statusText.textContent = "Mozilla detected — redirecting in 2 seconds...";

    setTimeout(() => {
      location.href = "https://www.bbc.co.uk";
    }, 2000);

  } else {
    statusText.textContent = "Mozilla not detected — no redirect.";
  }
</script>
</body>
</html>
